# ========================
# 文献采集系统配置
# ========================

# 采集来源配置
sources:
  local:
    enabled: true
    root_dir: "./data/PDFs"          # 本地 PDF 目录
    recursive: true                   # 是否递归扫描子目录
    
  web:
    enabled: true
    engines:
      google_scholar:
        enabled: true
        base_url: "https://scholar.google.com"
        delay: 3                      # 请求间隔（秒）
      
      cnki:                           # 知网
        enabled: true
        base_url: "https://www.cnki.net"
        delay: 2

# 采集控制参数
collection:
  max_from_web: 50                   # 网络最多采集数
  max_from_local: 100                # 本地最多扫描数
  total_limit: 150                   # 总采集数量限制(-1=无限)
  
  keywords:
    - "植物考古学"
    - "植物遗迹"
    - "识别技术"
  
  language:
    - "zh-CN"                        # 中文
    - "en"                           # 英文

# 去重与管理配置
deduplication:
  enabled: true
  check_by:
    - md5                            # 文件 MD5 哈希
    - title                          # 标题相似度
    - authors                        # 作者信息
  
  similarity_threshold: 0.85         # 相似度阈值（0-1）
  hash_algorithm: "md5"

# PDF 处理配置
pdf_processing:
  extract_metadata: true
  extract_images: true
  
  image_settings:
    min_width: 100                   # 最小宽度
    min_height: 100                  # 最小高度
    format: "png"                    # 输出格式
    dpi: 150                         # DPI 分辨率
  
  ocr:
    enabled: false                   # 是否启用 OCR
    languages:
      - "chi_sim"                    # 简体中文
      - "eng"                        # 英文

# 图注识别配置
figure_recognition:
  language: "mixed"                  # zh | en | mixed
  
  patterns:
    cn:
      - "图\\s*\\d+"                 # 图 1
      - "图\\s*\\d+\\.\\d+"          # 图 1.1
      - "插图\\s*\\d+"
    
    en:
      - "Figure\\s+\\d+"             # Figure 1
      - "Fig\\.\\s*\\d+"             # Fig. 1
      - "Fig\\s+\\d+"
  
  split_subfigures: false            # 是否拆分 a, b, c 等子图

# 输出配置
output:
  base_dir: "./output"
  
  structure:
    figures_dir: "figures"           # 提取的图版目录
    metadata_file: "metadata.xlsx"   # 元数据表格
    logs_dir: "logs"                 # 日志目录
    cache_file: "cache.db"           # 缓存数据库
  
  metadata_format: "excel"           # excel | csv
  
  fields:
    - paper_id
    - filename
    - title
    - authors
    - year
    - url
    - md5_hash
    - page_num
    - figure_id
    - figure_caption
    - figure_path
    - species
    - status
    - notes

# 日志配置
logging:
  level: "INFO"                      # DEBUG | INFO | WARNING | ERROR
  console_output: true
  file_output: true
  file_path: "./output/logs/collector.log"

# 网络代理（可选）
proxy:
  enabled: true
  http: "http://127.0.0.1:7897"
  https: "http://127.0.0.1:7897"
